services:
  gemini-api:
    image: cooooookk/gemini-business2api:latest
    container_name: gemini-business2api
    restart: unless-stopped
    ports:
      - "${PORT:-7860}:7860"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  refresh-worker:
    image: ${REFRESH_WORKER_IMAGE:-cooooookk/gemini-refresh-worker:latest}
    container_name: gemini-refresh-worker
    restart: unless-stopped
    profiles:
      - refresh
    depends_on:
      gemini-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/data.db
      HEALTH_PORT: ${REFRESH_HEALTH_PORT:-8080}
      FORCE_REFRESH_ENABLED: ${FORCE_REFRESH_ENABLED:-}
      REFRESH_INTERVAL_MINUTES: ${REFRESH_INTERVAL_MINUTES:-}
      REFRESH_WINDOW_HOURS: ${REFRESH_WINDOW_HOURS:-}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-}
      PROXY_FOR_AUTH: ${PROXY_FOR_AUTH:-}
    volumes:
      - ./data:/app/data
    ports:
      - "${REFRESH_HEALTH_PORT:-8080}:${REFRESH_HEALTH_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${HEALTH_PORT:-8080}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
